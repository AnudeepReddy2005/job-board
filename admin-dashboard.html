<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | GCC CareersHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="admin-dashboard.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            GCC Careers<span>Hub</span>
        </div>
        <nav>
            <a href="admin-dashboard.html" class="active">Dashboard</a>
            <a href="add-job.html">Add Job</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </header>

    <div class="container">
        <div class="dashboard-header">
            <div>
                <h2>Admin Dashboard</h2>
                <p>Manage all job postings from here.</p>
            </div>
            <a href="add-job.html" class="add-job-btn">
                <i class="fa-solid fa-plus"></i>
                Add New Job
            </a>
        </div>

        <div id="jobsContainer">
            </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <template id="jobTemplate">
        <div class="job-card">
            <h3 class="job-title"></h3>
            <p>
                <strong>Company :</strong>
                <span class="company"></span>
            </p>
            <p>
                <strong>Location :</strong>
                <span class="location"></span>
            </p>
            <p>
                <strong>Salary :</strong>
                <span class="salary"></span>
            </p>
            <p>
                <strong>Experience :</strong>
                <span class="experience"></span>
            </p>
            <p>
                <strong>Job Type :</strong>
                <span class="jobType"></span>
            </p>
            <p>
                <strong>Last Date :</strong>
                <span class="lastDate"></span>
            </p>
            <div class="job-actions">
                <button class="view-apps-btn" style="background: #0ea5e9; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: .3s;">
                    <i class="fa-solid fa-users"></i> Applications
                </button>
                <button class="edit-btn">
                    <i class="fa-solid fa-pen"></i> Edit
                </button>
                <button class="delete-btn">
                    <i class="fa-solid fa-trash"></i> Delete
                </button>
            </div>
        </div>
    </template>

    <div id="appsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Job Applications</h2>
                <span class="close-btn">&times;</span>
            </div>
            <div id="appsList" class="apps-list">
                </div>
        </div>
    </div>

    <script type="module" src="admin-dashboard.js"></script>

</body>

</html>
