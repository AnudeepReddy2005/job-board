<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Job | GCC CareersHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="add-job.css">

</head>

<body>

<header class="navbar">

    <div class="logo">

        GCC Careers<span>Hub</span>

    </div>

    <nav>

        <a href="admin-dashboard.html">Dashboard</a>

        <a href="add-job.html" class="active">Add Job</a>

        <a href="#" id="logoutBtn">Logout</a>

    </nav>

</header>

<section class="form-section">

    <div class="form-card">

        <h2 id="pageTitle">Add New Job</h2>

        <form id="jobForm">

            <div class="input-group">

                <label>Job Title</label>

                <input
                    type="text"
                    id="title"
                    placeholder="Frontend Developer"
                    required>

            </div>

            <div class="input-group">

                <label>Company Name</label>

                <input
                    type="text"
                    id="company"
                    placeholder="Google"
                    required>

            </div>

            <div class="input-group">

                <label>Location</label>

                <input
                    type="text"
                    id="location"
                    placeholder="Hyderabad"
                    required>

            </div>

            <div class="input-group">

                <label>Salary</label>

                <input
                    type="text"
                    id="salary"
                    placeholder="₹8 - ₹12 LPA"
                    required>

            </div>

            <div class="input-group">

                <label>Job Type</label>

                <select id="jobType" required>

                    <option value="">Select Job Type</option>
                    <option>Full Time</option>
                    <option>Part Time</option>
                    <option>Internship</option>
                    <option>Remote</option>

                </select>

            </div>

            <div class="input-group">

                <label>Experience</label>

                <input
                    type="text"
                    id="experience"
                    placeholder="0-2 Years"
                    required>

            </div>

            <div class="input-group">

                <label>Skills</label>

                <textarea
                    id="skills"
                    rows="3"
                    placeholder="HTML, CSS, JavaScript, React"
                    required></textarea>

            </div>

            <div class="input-group">

                <label>Job Description</label>

                <textarea
                    id="description"
                    rows="5"
                    placeholder="Enter job description"
                    required></textarea>

            </div>

            <div class="input-group">

                <label>Last Date to Apply</label>

                <input
                    type="date"
                    id="lastDate"
                    required>

            </div>

            <button
                type="submit"
                class="save-btn"
                id="saveBtn">

                Save Job

            </button>

        </form>

    </div>

</section>

<div id="loading" class="loading">

    <div class="spinner"></div>

    <p>Please Wait...</p>

</div>

<script type="module" src="add-job.js"></script>

</body>

</html>
